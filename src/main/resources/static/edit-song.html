<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Edit Song</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body data-bs-theme="dark">

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <strong>Izmeni pesmu</strong>
        </div>

        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">ID:</label>
                <input type="number" class="form-control" id="id" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Naziv:</label>
                <input type="text" class="form-control" id="title">
            </div>

            <div class="mb-3">
                <label class="form-label">Tekst pesme:</label>
                <textarea class="form-control" id="lyrics"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Poster:</label>
                <input type="text" class="form-control" id="poster">
            </div>

            <div class="mb-3">
                <label class="form-label">Trajanje:</label>
                <input type="time" class="form-control" id="time" step="1">
            </div>

            <div class="mb-3">
                <label class="form-label">Datum:</label>
                <input type="date" class="form-control" id="date">
            </div>
        </div>

        <div class="card-footer">
            <button type="button" class="btn btn-success" id="save">
                <i class="fa-regular fa-floppy-disk"></i>
                Sačuvaj
            </button>
        </div>
    </div>
</div>
<script src="utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>


<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (id == null || id === '') {
    window.location.href = '/list.html';
}

let song = null;

const inputId = document.getElementById('id');
const inputTitle = document.getElementById('title');
const inputLyrics = document.getElementById('lyrics');
const inputPoster = document.getElementById('poster');
const inputTime = document.getElementById('time');
const inputDate = document.getElementById('date');

fetch(`/api/song/${id}`)
.then(rsp => rsp.json())
.then(data => {
    song = data;

    inputId.value = song.songId;
    inputTitle.value = song.title;
    inputLyrics.value = song.lyrics;
    inputPoster.value = song.poster;
    inputTime.value = song.time;
    inputDate.value = song.date;
});

document.getElementById('save').addEventListener('click', () => {
    Swal.fire({
        title: 'Sačuvati izmene?',
        text: 'Da li ste sigurni da želite da sačuvate izmene?',
        icon: 'question',
        background: '#2b3035',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#198754',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sačuvaj',
        cancelButtonText: 'Ne'
    }).then((result) => {
        if (result.isConfirmed) {
            fetch(`/api/song/${song.songId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: inputTitle.value,
                    lyrics: inputLyrics.value,
                    poster: inputPoster.value,
                    time: inputTime.value,
                    date: inputDate.value
                })
            }).then(rsp => {
                if (rsp.ok) {
                    window.location.href = '/list.html';
                }
            });
        }
    });
});
</script>

</body>
</html>
