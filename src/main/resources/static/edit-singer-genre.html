<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Edit Singer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

   <style>
    .nav-item {
            font-size: 20px;
            font-weight: 500;
            transition: 0.2s;
}

.crud-container {
    max-width: 600px;
    margin: 0 auto;
}

.edit-box {
    max-width: 650px;
    margin: 70px auto;
    padding: 35px;
    background-color: #2b3035;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
}

.edit-title {
    text-align: center;
    font-size: 38px;
    font-weight: bold;
    margin: 0 0 35px 0;
}

.form-label {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
}

.form-control {
    height: 50px;
    font-size: 17px;
    margin-bottom: 20px;
}

.btn {
    font-size: 18px;
    padding: 10px 35px;
}

.text-center {
    margin-top: 10px;
}

   </style>

</head>
<body data-bs-theme="dark">
<nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

        

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<div class="container mt-5">

    <div class="crud-container">

        <div class="card shadow-lg">

            <div class="card-body">

                <h1 class="edit-title">
                    <i class="fa-solid fa-pen-to-square"></i>
                    Izmeni pevača i žanr
                </h1>

                <div class="mb-3">
                    <label class="form-label">Pevač</label>
                    <input id="singerName" class="form-control form-control-lg">
                </div>

                <div class="mb-4">
                    <label class="form-label">Žanr</label>
                    <input id="genreName" class="form-control form-control-lg">
                </div>

                <div class="text-center">
                    <button class="btn btn-success btn-lg px-5" id="save">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>
<script src="utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
const params = new URLSearchParams(window.location.search);
const singerId = params.get('singerId');
const genreId = params.get('genreId');
const songId = params.get('songId');

const singerName = document.getElementById('singerName');
const genreName = document.getElementById('genreName');

fetch(`/api/singer/${singerId}`)
.then(r => r.json())
.then(s => singerName.value = s.name);

fetch(`/api/genre/${genreId}`)
.then(r => r.json())
.then(g => genreName.value = g.name);
document.getElementById('save').addEventListener('click', () => {

    Swal.fire({
        title: 'Sačuvati izmene?',
        text: 'Da li ste sigurni da želite da sačuvate izmene?',
        icon: 'question',
        showCancelButton: true,
        background: '#2b3035',
    color: '#ffffff',
        confirmButtonColor: '#198754',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sačuvaj',
        cancelButtonText: 'Ne'
    }).then((result) => {

        if (result.isConfirmed) {

            Promise.all([
                fetch(`/api/singer/${singerId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: singerName.value })
                }),

                fetch(`/api/genre/${genreId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: genreName.value })
                })

            ]).then(() => {
                window.location.href = `/details.html?id=${songId}`;
            });

        }

    });

});
</script>
</body>
</html>
