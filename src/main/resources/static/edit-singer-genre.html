<html lang="sr">

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">

</head>
<body data-bs-theme="dark">
<nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

        

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<div class="container mt-5">

    <div class="crud-container">

        <div class="card shadow-lg">

            <div class="card-body">

                <h1 class="edit-title">
                    <i class="fa-solid fa-pen-to-square"></i>
                    Edit Singer and Genre
                </h1>

                <div class="mb-3">
                    <label class="form-label">Singer</label>
                    <input id="singerName" class="form-control form-control-lg">
                </div>

                <div class="mb-4">
                    <label class="form-label">Genre</label>
                    <input id="genreName" class="form-control form-control-lg">
                </div>

                <div class="text-center">
                    <button class="btn btn-success btn-lg px-5" id="save">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>
<script src="utils.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const singerId = params.get('singerId');
const genreId = params.get('genreId');
const songId = params.get('songId');

const singerName = document.getElementById('singerName');
const genreName = document.getElementById('genreName');

fetch(`/api/singer/${singerId}`)
.then(r => r.json())
.then(s => singerName.value = s.name);

fetch(`/api/genre/${genreId}`)
.then(r => r.json())
.then(g => genreName.value = g.name);

document.getElementById('save').addEventListener('click', () => {
    Promise.all([
        fetch(`/api/singer/${singerId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: singerName.value })
        }),
        fetch(`/api/genre/${genreId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: genreName.value })
        })
    ]).then(() => {
        window.location.href = `/details.html?id=${songId}`;
    });
});
</script>

</body>
</html>
