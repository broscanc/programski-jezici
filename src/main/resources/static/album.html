<div class="container">

    <table class="table table-striped">

        <thead>
            <tr>
                <th>#</th>
                <th>Naziv</th>
                <th>Pevač</th>
                <th>Opcije</th>
            </tr>
        </thead>

        <tbody id="songs">

        </tbody>

    </table>

</div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
    <script>
      
        const table=document.getElementById('songs')
        function edit(id){
            window.location.href='/edit-album.html?id='+id
        }
        function remove(id) {
    Swal.fire({
        title: 'Obrisati album?',
        text: `Da li sigurno želiš da obrišeš album ${id}?`,
        icon: 'warning',
        background: '#2b3035',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#dc3545',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Obriši',
        cancelButtonText: 'Ne'
    }).then((result) => {
        if (result.isConfirmed) {
            fetch(`/api/album/${id}`, {
                method: 'DELETE'
            })
            .then(rsp => {
                if (rsp.ok) {
                    window.location.reload();
                } else {
                    Swal.fire({
                        title: 'Greška!',
                        text: 'Brisanje albuma nije uspelo.',
                        icon: 'error',
                        background: '#2b3035',
                        color: '#fff'
                    });
                }
            })
            .catch(error => {
                console.error(error);

                Swal.fire({
                    title: 'Greška!',
                    text: 'Došlo je do greške prilikom brisanja.',
                    icon: 'error',
                    background: '#2b3035',
                    color: '#fff'
                });
            });
        }
    });
}
         fetch('/api/album')
         .then(rsp=>rsp.json())
         .then(data=>{
            let content=''
            const albums = Array.isArray(data) ? data : data.content;

            for(let album of albums){
            
                content+=` <tr>

            <th>${album.albumId}</th>

            <td>${album.title}</td>

            <td>${album.bend}</td>


            <td>
                <div class="btn-group">
                <button 
                   class="btn btn-sm btn-primary" type="button" onclick="edit(${album.albumId})">
                   <i class="fa-regular fa-pen-to-square"></i>
                    
                </button>
                <button 
                   class="btn btn-sm btn-danger" type="button" onclick="remove(${album.albumId})">
                   <i class="fa-regular fa-trash-can"></i>
                    
                </button>
                </div>
            </td>

        </tr>`;
        console.log(data);
            }
            table.innerHTML=content
            //Swal.closeLoading()
         })
        
    </script>
   
</body>
</html>
