<div class="container">

    <table class="table table-striped">

        <thead>
            <tr>
                <th>#</th>
                <th>Naziv</th>
                <th>Pevač</th>
                <th>Opcije</th>
            </tr>
        </thead>

        <tbody id="songs">

        </tbody>

    </table>

</div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /*Swal.fire({
            title: 'Loading Albums'
        }).then(()=>{
            Swal.showLoading()
        })*/
        const table=document.getElementById('songs')
        function edit(id){
            window.location.href='/edit-album.html?id='+id
        }
        function remove(id){
            if(!confirm(`Obrisi album ${id}?`))
            return

            fetch(`/api/album/${id}`, {method: 'delete'})
            .then(rsp=>window.location.reload())
           
        }
         fetch('/api/album')
         .then(rsp=>rsp.json())
         .then(data=>{
            let content=''
            const albums = Array.isArray(data) ? data : data.content;

            for(let album of albums){
            
                content+=` <tr>

            <th>${album.albumId}</th>

            <td>${album.title}</td>

            <td>${album.bend}</td>


            <td>
                <div class="btn-group">
                <button 
                   class="btn btn-sm btn-success" type="button" onclick="edit(${album.albumId})">
                   <i class="fa-regular fa-pen-to-square"></i>
                    
                </button>
                <button 
                   class="btn btn-sm btn-danger" type="button" onclick="remove(${album.albumId})">
                   <i class="fa-regular fa-trash-can"></i>
                    
                </button>
                </div>
            </td>

        </tr>`;
        console.log(data);
            }
            table.innerHTML=content
            //Swal.closeLoading()
         })
        
    </script>
   
</body>
