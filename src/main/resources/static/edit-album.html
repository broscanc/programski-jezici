<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Album</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
    .nav-item {
            font-size: 20px;
            font-weight: 500;
            transition: 0.2s;
}

.crud-container {
    max-width: 600px;
    margin: 0 auto;
}

.edit-box {
    max-width: 650px;
    margin: 70px auto;
    padding: 35px;
    background-color: #2b3035;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
}

.edit-title {
    text-align: center;
    font-size: 38px;
    font-weight: bold;
    margin: 0 0 35px 0;
}

.form-label {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
}

.form-control {
    height: 50px;
    font-size: 17px;
    margin-bottom: 20px;
}

.btn {
    font-size: 18px;
    padding: 10px 35px;
}

.text-center {
    margin-top: 10px;
}
h2{
    text-align: center;
}
   </style>

</head>
<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

        

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<div class="container">
    <div class="crud-container">
        <div class="card">
            <div class="card-header">
                <h2>Izmeni album:</h2>
            </div>
            <div class="card-body">
                 <div class="mb-3">
                    <label for="id" class="form-label">ID: </label>
                    <input type="number" class="form-control" id="id">
                </div>
                <div class="mb-3">
                    <label for="title" class="form-text">Naslov: </label>
                    <input type="text" class="form-control" id="title">
                </div>
                <div class="mb-3">
                    <label for="bend" class="form-text">Bend: </label>
                    <input type="text" class="form-control" id="bend">
                </div>
            </div>
            <div class="card-footer">
                <button type="button" class="btn btn-success" id="save">
                    <i class="fa-regular fa-floppy-disk"></i>Sačuvaj
                </button>
            </div>
        </div>
    </div>
 </div>
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>

    <script>
       const params=new URLSearchParams(window.location.search)
       const id=params.get('id')

       const inputId=document.getElementById('id')
       const inputTitle=document.getElementById('title')
       const inputBend=document.getElementById('bend')

       function openAll(){
        window.location.href='/album.html'
       }
       if(id==null || id=='')
        {
            openAll()
        }
       fetch(`/api/album/${id}`)
       .then(rsp=>rsp.json())
       .then(data=>{
        inputId.value=data.albumId
        inputTitle.value=data.title
        inputBend.value=data.bend
document.getElementById('save').addEventListener('click', () => {

    Swal.fire({
        title: 'Sačuvati izmene?',
        text: 'Da li ste sigurni da želite da sačuvate izmene?',
        icon: 'question',
        background: '#2b3035',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#198754',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sačuvaj',
        cancelButtonText: 'Ne'
    }).then((result) => {

        if (result.isConfirmed) {

            fetch(`/api/album/${data.albumId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: inputTitle.value,
                    bend: inputBend.value
                })
            })
            .then(rsp => {

                if (rsp.ok) {
                    openAll();
                } else {
                    Swal.fire({
                        title: 'Greška!',
                        text: 'Izmena nije uspela.',
                        icon: 'error',
                        background: '#2b3035',
                        color: '#fff'
                    });
                }

            })
            .catch(error => {
                console.error(error);

                Swal.fire({
                    title: 'Greška!',
                    text: 'Došlo je do greške prilikom izmene.',
                    icon: 'error',
                    background: '#2b3035',
                    color: '#fff'
                });
            });

        }

    });

});

       })
    </script>
   
</body>
</html>
