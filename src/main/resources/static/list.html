<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

     <style>
        .nav-item {
    font-size: 20px;
    font-weight: 500;
    transition: 0.2s;
}
     </style>
</head>

<body data-bs-theme="dark">

<nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

       

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>
                <a href="add-song.html" class="btn btn-success ms-3">
                    <i class="fa-solid fa-plus"></i>
                    Dodaj pesmu
                </a>
            
        

        </div>
    </div>
</nav>

<div class="container">
    <div class="mb-3">
    <button class="btn btn-warning" onclick="shuffleSongs()">
        <i class="fa-solid fa-shuffle"></i>
        Shuffle
    </button>
</div>
    <table class="table table-striped">

        <thead>
            <tr>
                <th>#</th>
                <th>Naziv</th>
                <th>Trajanje</th>
                <th>Album</th>
                <th>Žanr</th>
                <th>Pevač</th>
                <th>Opcije</th>
            </tr>
        </thead>

        <tbody id="songs">

        </tbody>

    </table>


</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
let songs = [];

function edit(id) {
    Swal.fire({
        title: 'Izmeniti pesmu?',
        text: 'Da li želite da otvorite stranicu za izmenu?',
        icon: 'question',
        background: '#2b3035',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#198754',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Izmeni',
        cancelButtonText: 'Ne'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/edit-song.html?id=' + id;
        }
    });
}
function deleteSong(id) {
    Swal.fire({
        title: 'Obrisati pesmu?',
        text: 'Da li sigurno želiš da obrišeš ovu pesmu?',
        icon: 'warning',
        background: '#2b3035',
        color: '#fff',
        showCancelButton: true,
        confirmButtonColor: '#dc3545',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Obriši',
        cancelButtonText: 'Ne'
    }).then((result) => {
        if (result.isConfirmed) {
            fetch(`/api/song/${id}`, {
                method: 'DELETE'
            })
            .then(rsp => {
                if (rsp.ok) {
                    location.reload();
                } else {
                    Swal.fire({
                        title: 'Greška!',
                        text: 'Brisanje nije uspelo.',
                        icon: 'error',
                        background: '#2b3035',
                        color: '#fff'
                    });
                }
            })
            .catch(error => {
                console.error(error);
                Swal.fire({
                    title: 'Greška!',
                    text: 'Došlo je do greške.',
                    icon: 'error',
                    background: '#2b3035',
                    color: '#fff'
                });
            });
        }
    });
}

function showSongs(list) {
    const tbody = document.getElementById('songs');

    let content = '';

    for (const song of list) {
        content += `
        <tr>
            <th>${song.songId}</th>

            <td>${song.title}</td>

            <td>${song.time}</td>

            <td>${song.album ? song.album.title : '-'}</td>

            <td>
                ${
                    song.genres && song.genres.length > 0
                    ? song.genres.map(g => g.name).join(', ')
                    : '-'
                }
            </td>

            <td>
                ${
                    song.singers && song.singers.length > 0
                    ? song.singers.map(s => s.name).join(', ')
                    : '-'
                }
            </td>

            <td>
                <div class="btn-group">
                    <a href="./details.html?id=${song.songId}"
                       class="btn btn-sm btn-primary">
                        <i class="fa-solid fa-up-right-from-square"></i>
                    </a>

                    <button class="btn btn-sm btn-success"
                            type="button"
                            onclick="edit(${song.songId})">
                        <i class="fa-regular fa-pen-to-square"></i>
                    </button>

                    <button class="btn btn-sm btn-danger"
                            type="button"
                            onclick="deleteSong(${song.songId})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
        `;
    }

    tbody.innerHTML = content;
}

function shuffleSongs() {
    const shuffled = [...songs];

    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    showSongs(shuffled);
}

fetch('http://localhost:8080/api/song')
.then(rsp => rsp.json())
.then(data => {
    songs = data.sort((s1, s2) => s1.songId - s2.songId);
    showSongs(songs);
})
.catch(error => {
    console.error(error);
});
</script>
</body>
</html>
