<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body data-bs-theme="dark">

<nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

       

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>
                <a href="add-song.html" class="btn btn-success ms-3">
                    <i class="fa-solid fa-plus"></i>
                    Dodaj pesmu
                </a>
            
        

        </div>
    </div>
</nav>

<div class="container">

    <table class="table table-striped">

        <thead>
            <tr>
                <th>#</th>
                <th>Naziv</th>
                <th>Trajanje</th>
                <th>Album</th>
                <th>Žanr</th>
                <th>Pevač</th>
                <th>Opcije</th>
            </tr>
        </thead>

        <tbody id="songs">

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
function edit(id) {
    window.location.href = '/edit-song.html?id=' + id;
}
function deleteSong(id) {
    console.log(id);

    if (confirm('Da li sigurno želiš da obrišeš ovu pesmu?')) {
        fetch(`/api/song/${id}`, {
            method: 'DELETE'
        })
        .then(rsp => {
            if (rsp.ok) {
                window.location.reload();
            }
        })
        .catch(error => console.error(error));
    }
}
fetch('http://localhost:8080/api/song')
.then(rsp => rsp.json())
.then(data => {

    const list = document.getElementById('songs');

    const sorted = data.sort(
        (s1, s2) => s1.songId - s2.songId
    );

    let content = '';

    for (const song of sorted) {

        content += `
        <tr>

            <th>${song.songId}</th>

            <td>${song.title}</td>

            <td>${song.time}</td>

            <td>
                ${song.album ? song.album.title : '-'}
            </td>

            <td>
                ${
                    song.genres && song.genres.length > 0 ? song.genres.map(g => g.name).join(', ') : '-'
                }
            </td>

            <td>
                ${
                    song.singers && song.singers.length > 0 ? song.singers.map(s => s.name).join(', ') : '-'
                }
            </td>

            <td>
    <div class="btn-group">
        <a href="./details.html?id=${song.songId}"
           class="btn btn-sm btn-primary">
            <i class="fa-solid fa-up-right-from-square"></i>
        </a>

        <button class="btn btn-sm btn-success"
                type="button"
                onclick="edit(${song.songId})">
            <i class="fa-regular fa-pen-to-square"></i>
        </button>
        <button class="btn btn-sm btn-danger"
                type="button"
                onclick='deleteSong(${song.songId})'>
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</td>

        </tr>
        `;
    }
console.log(data);
    list.innerHTML = content;
})
.catch(error => {
    console.error(error);
});

</script>

</body>
</html>
