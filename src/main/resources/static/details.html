<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="/css/style.css">

    <style>
        .text-justify{
            text-align: center;
        }
    </style>
</head>

<body data-bs-theme="dark">

<nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active"
                       href="index.html">
                        <i class="fa-solid fa-house"></i>
                        Početna
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<div class="container">

    <div class="row">

        <div class="col-12 col-md-4">
            <img id="poster"
                 class="img-fluid mb-3">
        </div>

        <div class="col-12 col-md-4">

            <div class="card mb-3">

                <div class="card-header fw-bold"
                     id="title">
                </div>

                <div class="card-body text-justify"
                     id="lyrics">
                </div>

                <ul class="list-group list-group-flush fw-bold">

                    <li class="list-group-item">
                        <i class="fa-regular fa-clock"></i>
                        <span id="time"></span>
                    </li>

                    <li class="list-group-item">
                        <i class="fa-solid fa-calendar"></i>
                        <span id="date"></span>
                    </li>

                    <li class="list-group-item">
                        <i class="fa-solid fa-compact-disc"></i>
                        <span id="album"></span>
                    </li>

                </ul>

            </div>

        </div>

        <div class="col-12 col-md-4">

            <div class="card mb-3"
                 id="singer-card"
                 hidden>

                <div class="card-header fw-bold">
                    Pevači
                </div>

                <ul class="list-group list-group-flush"
                    id="singers">
                </ul>

            </div>

            <div class="card mb-3">

                <div class="card-header fw-bold">
                    Žanrovi
                </div>

                <ul class="list-group list-group-flush"
                    id="genres">
                </ul>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

/*
    OVAJ URL PROMENI PREMA SVOM API-JU
*/
fetch(`http://localhost/api/song/${id}`)
.then(rsp => rsp.json())
.then(data => {

    document.getElementById('poster').src = data.poster;
    document.getElementById('poster').alt = data.title;

    document.getElementById('title').innerText =
        data.title;

    document.getElementById('lyrics').innerText =
        data.lyrics ?? 'Lyrics unavailable';

    document.getElementById('time').innerText =
        data.time;

    document.getElementById('date').innerText =
        data.date;

    document.getElementById('album').innerText =
        data.album.title;

    if(data.songSingers &&
       data.songSingers.length > 0){

        const singers =
            document.getElementById('singers');

        for(const s of data.songSingers){

            const li =
                document.createElement('li');

            li.className =
                'list-group-item';

            li.innerText =
                s.singer.name;

            singers.appendChild(li);
        }

        document.getElementById('singer-card')
            .hidden = false;
    }

    if(data.songGenres){

        const genres =
            document.getElementById('genres');

        for(const g of data.songGenres){

            const li =
                document.createElement('li');

            li.className =
                'list-group-item';

            li.innerText =
                g.genre.name;

            genres.appendChild(li);
        }
    }

})
.catch(error => {
    console.error(error);
});

</script>

</body>
</html>
