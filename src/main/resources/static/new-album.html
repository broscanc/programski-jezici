<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Album</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg mb-3">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-music"></i>
            MusicBox
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active"
                       href="index.html">
                        <i class="fa-solid fa-house"></i>
                        Početna
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="list.html">
                        <i class="fa-solid fa-table-list"></i>
                        Lista
                    </a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link active"
                       href="album.html">
                        <i class="fa-solid fa-compact-disc"></i>
                        Albumi
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<div class="container">
    <div class="crud-container">
        <div class="card">
            <div class="card-header">
                <strong>Dodaj Album</strong>
            </div>
            <div class="card-body">
                 
                <div class="mb-3">
                    <label for="title" class="form-text">Naslov: </label>
                    <input type="text" class="form-control" id="title">
                </div>
                <div class="mb-3">
                    <label for="bend" class="form-text">Bend: </label>
                    <input type="text" class="form-control" id="bend">
                </div>
            </div>
            <div class="card-footer">
                <button type="button" class="btn btn-success" id="save">
                    <i class="fa-regular fa-floppy-disk"></i>Save
                </button>
            </div>
        </div>
    </div>
 </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      
       const inputTitle=document.getElementById('title')
       const inputBend=document.getElementById('bend')

       function openAll(){
        window.location.href='/album.html'
       }
      
       

       document.getElementById('save').addEventListener('click',() =>{
            fetch(`/api/album`,{
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: inputTitle.value,
                    bend: inputBend.value
                })
            })//.then(rsp=> openAll())
            .then(async rsp => {
    console.log("STATUS:", rsp.status);
    console.log(await rsp.text());

    if (rsp.ok) {
        openAll();
    }
})
.catch(error => console.error("FETCH ERROR:", error));
        })

       
    </script>
   
</body>
</html>
